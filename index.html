<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indiana Primary Instructor Exam - Quiz Game</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card-hover: #334155;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: #475569;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Layout shell ── */
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 24px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 1.8em;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header p { color: var(--muted); font-size: 0.9em; }

  /* ── Progress bar (just below header, above game) ── */
  .progress-bar {
    height: 6px;
    background: var(--card);
    border-radius: 3px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s;
    border-radius: 3px;
  }

  /* ── Game area grows to fill available space ── */
  #gameArea { flex: 1; }

  /* ── Bottom controls panel ── */
  .bottom-controls {
    border-top: 1px solid var(--border);
    padding-top: 18px;
    margin-top: 20px;
  }

  /* Stats Bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 12px;
    background: var(--card);
    border-radius: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-value { font-size: 1.4em; font-weight: 700; }
  .stat-label { font-size: 0.72em; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-green .stat-value { color: var(--green); }
  .stat-red   .stat-value { color: var(--red); }
  .stat-yellow .stat-value { color: var(--yellow); }
  .stat-blue  .stat-value { color: var(--accent); }

  /* Mode Selector */
  .mode-selector {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }
  .mode-btn {
    padding: 12px 10px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-size: 0.85em;
  }
  .mode-btn:hover  { border-color: var(--accent); background: var(--card-hover); }
  .mode-btn.active { border-color: var(--accent); background: rgba(56,189,248,0.15); }
  .mode-btn .mode-icon { font-size: 1.3em; display: block; margin-bottom: 4px; }
  .mode-btn .mode-name { font-weight: 600; }
  .mode-btn .mode-desc { font-size: 0.72em; color: var(--muted); margin-top: 3px; }

  /* Category Filter */
  .category-filter { margin-bottom: 6px; }
  .category-filter label { color: var(--muted); font-size: 0.85em; margin-right: 8px; }
  .category-filter select {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 0.88em;
    cursor: pointer;
  }

  /* ── Quiz Card ── */
  .quiz-card {
    background: var(--card);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .question-number { color: var(--muted); font-size: 0.82em; margin-bottom: 10px; }
  .question-text   { font-size: 1.12em; line-height: 1.6; margin-bottom: 22px; }
  .category-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.68em;
    background: rgba(129,140,248,0.2);
    color: var(--accent2);
    margin-bottom: 12px;
  }

  /* Multiple Choice */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    padding: 13px 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    font-size: 0.93em;
    line-height: 1.4;
  }
  .option-btn:hover:not(.disabled) { border-color: var(--accent); background: rgba(56,189,248,0.1); }
  .option-btn.correct      { border-color: var(--green); background: rgba(74,222,128,0.15); }
  .option-btn.incorrect    { border-color: var(--red);   background: rgba(248,113,113,0.15); }
  .option-btn.disabled     { cursor: default; opacity: 0.7; }
  .option-btn.show-correct { border-color: var(--green); background: rgba(74,222,128,0.1); }

  /* True/False */
  .tf-options { display: flex; gap: 15px; }
  .tf-btn {
    flex: 1;
    padding: 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 1.05em;
    font-weight: 600;
    transition: all 0.2s;
  }
  .tf-btn:hover:not(.disabled) { border-color: var(--accent); }
  .tf-btn.correct  { border-color: var(--green); background: rgba(74,222,128,0.15); }
  .tf-btn.incorrect{ border-color: var(--red);   background: rgba(248,113,113,0.15); }

  /* Write Mode */
  .text-input-area { display: flex; flex-direction: column; gap: 12px; }
  .text-input {
    width: 100%;
    padding: 13px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1em;
    resize: none;
  }
  .text-input:focus { outline: none; border-color: var(--accent); }

  /* Flashcard */
  .flashcard-container { perspective: 1000px; cursor: pointer; }
  .flashcard {
    min-height: 220px;
    position: relative;
    transition: transform 0.6s;
    transform-style: preserve-3d;
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .flashcard-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    padding: 28px;
    border-radius: 12px;
    text-align: center;
    font-size: 1.08em;
    line-height: 1.6;
  }
  .flashcard-front { background: var(--card); border: 2px solid var(--border); }
  .flashcard-back  { background: var(--card); border: 2px solid var(--accent); transform: rotateY(180deg); }
  .flip-hint { text-align: center; color: var(--muted); font-size: 0.78em; margin-top: 10px; }

  /* Explanation */
  .explanation {
    margin-top: 14px;
    padding: 13px 16px;
    border-radius: 10px;
    background: rgba(56,189,248,0.1);
    border-left: 3px solid var(--accent);
    font-size: 0.88em;
    line-height: 1.5;
    color: var(--muted);
    animation: fadeIn 0.3s ease;
  }
  .explanation strong { color: var(--green); }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn {
    padding: 11px 22px;
    border: none;
    border-radius: 10px;
    font-size: 0.93em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary   { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--card-hover); }
  .btn-danger    { background: rgba(248,113,113,0.2); color: var(--red); }

  /* Confidence */
  .confidence-meter { display: flex; gap: 8px; margin-top: 14px; }
  .confidence-btn {
    flex: 1; padding: 9px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.78em;
    transition: all 0.2s;
  }
  .confidence-btn:hover  { border-color: var(--accent); color: var(--text); }
  .confidence-btn.hard   { border-color: var(--red);    color: var(--red);    background: rgba(248,113,113,0.1); }
  .confidence-btn.medium { border-color: var(--yellow); color: var(--yellow); background: rgba(251,191,36,0.1); }
  .confidence-btn.easy   { border-color: var(--green);  color: var(--green);  background: rgba(74,222,128,0.1); }

  /* Results */
  .results { text-align: center; padding: 36px 20px; }
  .results h2 { font-size: 1.9em; margin-bottom: 8px; }
  .results .score { font-size: 3.8em; font-weight: 700; margin: 18px 0; }
  .results .score.great      { color: var(--green); }
  .results .score.okay       { color: var(--yellow); }
  .results .score.needs-work { color: var(--red); }
  .missed-list { text-align: left; margin: 18px 0; }
  .missed-item {
    background: var(--card);
    padding: 13px;
    border-radius: 10px;
    margin-bottom: 9px;
    border-left: 3px solid var(--red);
  }
  .missed-item .missed-q { font-weight: 600; margin-bottom: 5px; }
  .missed-item .missed-a { color: var(--green); font-size: 0.88em; }

  /* Streak */
  .streak {
    position: fixed; top: 16px; right: 16px;
    padding: 7px 13px;
    border-radius: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    font-size: 0.83em;
    display: none;
    z-index: 100;
  }
  .streak.active { display: block; animation: pulse 0.5s; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 12px; }
    .header h1 { font-size: 1.3em; }
    .quiz-card  { padding: 18px; }
    .stats-bar  { gap: 14px; }
    .mode-selector { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<div class="streak" id="streak">Streak: <span id="streakCount">0</span></div>

<div class="container">

  <!-- ① Header -->
  <div class="header">
    <h1>Indiana Primary Instructor Exam</h1>
    <p>133 questions · Master the material with multiple study modes</p>
  </div>

  <!-- ② Progress bar -->
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <!-- ③ Question / Game area -->
  <div id="gameArea"></div>

  <!-- ④ Bottom controls: stats + modes + category -->
  <div class="bottom-controls">

    <div class="stats-bar" id="statsBar">
      <div class="stat stat-blue">  <div class="stat-value" id="totalAnswered">0</div>  <div class="stat-label">Answered</div></div>
      <div class="stat stat-green"> <div class="stat-value" id="correctCount">0</div>   <div class="stat-label">Correct</div></div>
      <div class="stat stat-red">   <div class="stat-value" id="incorrectCount">0</div> <div class="stat-label">Missed</div></div>
      <div class="stat stat-yellow"><div class="stat-value" id="accuracy">0%</div>      <div class="stat-label">Accuracy</div></div>
    </div>

    <div class="mode-selector" id="modeSelector">
      <button class="mode-btn active" onclick="setMode('quiz')">
        <span class="mode-icon">🎯</span>
        <span class="mode-name">Quiz</span>
        <span class="mode-desc">Multiple choice</span>
      </button>
      <button class="mode-btn" onclick="setMode('flashcard')">
        <span class="mode-icon">📇</span>
        <span class="mode-name">Flashcards</span>
        <span class="mode-desc">Flip to reveal</span>
      </button>
      <button class="mode-btn" onclick="setMode('write')">
        <span class="mode-icon">✍️</span>
        <span class="mode-name">Write It</span>
        <span class="mode-desc">Type the answer</span>
      </button>
      <button class="mode-btn" onclick="setMode('hardest')">
        <span class="mode-icon">🔥</span>
        <span class="mode-name">Hardest</span>
        <span class="mode-desc">Focus on misses</span>
      </button>
      <button class="mode-btn" onclick="setMode('exam')">
        <span class="mode-icon">📝</span>
        <span class="mode-name">Mock Exam</span>
        <span class="mode-desc">Timed 50 Qs</span>
      </button>
    </div>

    <div class="category-filter">
      <label>Category:</label>
      <select id="categorySelect" onchange="filterCategory()">
        <option value="all">All Topics</option>
      </select>
    </div>

  </div><!-- /bottom-controls -->
</div><!-- /container -->

<script>
// ===== FLASHCARD DATA =====
const rawCards = [
  {q:"Educators are responsible for:\na. Accurately representing the work of others (avoiding plagiarism)\nb. Maintain professional, vocational, and academic competence\nc. Maintain confidentiality in matters related to evaluation and assessment\nd. All of the above",a:"d. All of the above",cat:"Professional Ethics"},

  {q:"Global thinkers are _________ brained, and enjoy ___________.\na. Left, Numbers and Words\nb. Left, Art and Creative Activities\nc. Right, Numbers and Words\nd. Right, Art and Creative Activities",a:"d. Right, Art and Creative Activities",cat:"Brain & Learning"},
  {q:"You have just communicated something that is slightly complex, which of the following is the best way to see if the student understood you?\na. Look for his/her facial expressions\nb. Have the student repeat exactly what you just said\nc. Test the student right afterward with a written test\nd. Have the student rephrase what you said",a:"d. Have the student rephrase what you said",cat:"Communication"},
  {q:"Which of the following is considered feedback?\na. Tests and quizzes\nb. Facial expressions\nc. Verbal responses\nd. All of the above",a:"d. All of the above",cat:"Communication"},

  {q:"Maslow's hierarchy of needs includes all of the following EXCEPT:\na. Self-actualization\nb. Love/belonging\nc. Safety\nd. Financial success",a:"d. Financial success",cat:"Learning Theory"},

  {q:"The highest level of the Cognitive Domain is:\na. Synthesis\nb. Evaluation\nc. Analysis\nd. Application",a:"b. Evaluation",cat:"Learning Domains"},

  {q:"The Psychomotor Domain levels are as follows:\na. Imitation, Precision, Articulation, Naturalization, Manipulation\nb. Manipulation, Precision, Articulation, Naturalization, Imitation\nc. Imitation, Manipulation, Articulation, Precision, Naturalization\nd. Imitation, Manipulation, Precision, Articulation, Naturalization",a:"d. Imitation, Manipulation, Precision, Articulation, Naturalization",cat:"Learning Domains"},
  {q:"True or False: Motivation is defined as the internal drive that pushes us toward action",a:"True",cat:"Motivation"},
  {q:"Which of the following is NOT a type of motivation?\na. Intrinsic\nb. Extrinsic\nc. External\nd. Internal",a:"c. External",cat:"Motivation"},

// ===== STATE =====
let state = {
  mode: 'quiz',
  currentIndex: 0,
  answered: 0,
  correct: 0,
  incorrect: 0,
  streak: 0,
  maxStreak: 0,
  missed: [],
  hardCards: [],
  cardHistory: {},
  filteredCards: [...rawCards],
  shuffled: [],
  flipped: false,
  examTimer: null,
  examTimeLeft: 0,
  examAnswers: [],
};

// ===== INIT =====
function init() {
  loadState();
  buildCategories();
  shuffle();
  renderCard();
}

function loadState() {
  try {
    const saved = localStorage.getItem('inQuizState');
    if (saved) {
      const s = JSON.parse(saved);
      state.cardHistory = s.cardHistory || {};
      state.hardCards   = s.hardCards   || [];
      state.answered    = s.answered    || 0;
      state.correct     = s.correct     || 0;
      state.incorrect   = s.incorrect   || 0;
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('inQuizState', JSON.stringify({
      cardHistory: state.cardHistory,
      hardCards:   state.hardCards,
      answered:    state.answered,
      correct:     state.correct,
      incorrect:   state.incorrect,
    }));
  } catch(e) {}
}

function buildCategories() {
  const cats = new Set(rawCards.map(c => c.cat));
  const sel  = document.getElementById('categorySelect');
  cats.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat; opt.textContent = cat;
    sel.appendChild(opt);
  });
}

function filterCategory() {
  const cat = document.getElementById('categorySelect').value;
  state.filteredCards = cat === 'all' ? [...rawCards] : rawCards.filter(c => c.cat === cat);
  shuffle();
  state.currentIndex = 0;
  renderCard();
}

function shuffle() {
  state.shuffled = [...state.filteredCards].sort(() => Math.random() - 0.5);
}

function setMode(mode) {
  state.mode = mode;
  state.currentIndex = 0;
  state.flipped = false;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.mode-btn[onclick="setMode('${mode}')"]`).classList.add('active');

  if (mode === 'hardest') {
    const hard = Object.entries(state.cardHistory)
      .filter(([k,v]) => v.wrong > 0)
      .sort((a,b) => (b[1].wrong/(b[1].wrong+b[1].right)) - (a[1].wrong/(a[1].wrong+a[1].right)));
    if (hard.length === 0) {
      document.getElementById('gameArea').innerHTML = `
        <div class="quiz-card" style="text-align:center;">
          <h3 style="margin-bottom:12px;">No missed questions yet!</h3>
          <p style="color:var(--muted);">Start with Quiz Mode to build your missed-questions list, then come back here.</p>
        </div>`;
      return;
    }
    state.shuffled = hard.map(([k]) => rawCards[parseInt(k)]).filter(Boolean);
  } else if (mode === 'exam') {
    startExam(); return;
  } else {
    shuffle();
  }
  renderCard();
}

function updateStats() {
  document.getElementById('totalAnswered').textContent = state.answered;
  document.getElementById('correctCount').textContent  = state.correct;
  document.getElementById('incorrectCount').textContent= state.incorrect;
  const acc = state.answered > 0 ? Math.round((state.correct / state.answered) * 100) : 0;
  document.getElementById('accuracy').textContent = acc + '%';
  const pct = state.shuffled.length > 0 ? (state.currentIndex / state.shuffled.length) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function updateStreak(correct) {
  const el = document.getElementById('streak');
  if (correct) {
    state.streak++;
    if (state.streak > state.maxStreak) state.maxStreak = state.streak;
    if (state.streak >= 3) {
      el.classList.add('active');
      document.getElementById('streakCount').textContent = state.streak;
    }
  } else {
    state.streak = 0;
    el.classList.remove('active');
  }
}

// ===== PARSE QUESTION =====
function parseQuestion(card) {
  const text = card.q;
  const optionMatch = text.match(/^(.*?)(?:\n)?a\.\s*(.*?)(?:\n)?b\.\s*(.*?)(?:\n)?(?:c\.\s*(.*?))?(?:\n)?(?:d\.\s*(.*))?$/s);
  if (optionMatch) {
    const stem = optionMatch[1].trim();
    const options = [optionMatch[2]?.trim()].filter(Boolean);
    if (optionMatch[3]) options.push(optionMatch[3].trim());
    if (optionMatch[4]) options.push(optionMatch[4].trim());
    if (optionMatch[5]) options.push(optionMatch[5].trim());
    return { stem, options, type: 'mc' };
  }
  if (card.a === 'True' || card.a === 'False') {
    return { stem: text, options: ['True','False'], type: 'tf' };
  }
  return { stem: text, options: null, type: 'definition' };
}

// ===== RENDER =====
function renderCard() {
  updateStats();
  if (state.currentIndex >= state.shuffled.length) { showResults(); return; }
  const card   = state.shuffled[state.currentIndex];
  const parsed = parseQuestion(card);
  const area   = document.getElementById('gameArea');

  if (state.mode === 'flashcard') { renderFlashcard(card, parsed); return; }
  if (state.mode === 'write')     { renderWriteMode(card, parsed); return; }

  // Quiz / Hardest
  let optionsHtml = '';
  if (parsed.type === 'tf') {
    optionsHtml = `<div class="tf-options">
      <button class="tf-btn" onclick="checkAnswer(this,'True','${card.a}')">True</button>
      <button class="tf-btn" onclick="checkAnswer(this,'False','${card.a}')">False</button>
    </div>`;
  } else if (parsed.options) {
    const labels = ['a','b','c','d'];
    const shuffledOpts = [...parsed.options].sort(() => Math.random() - 0.5);
    optionsHtml = '<div class="options">' + shuffledOpts.map((opt, i) => {
      const esc1 = opt.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      const esc2 = card.a.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      return `<button class="option-btn" onclick="checkMC(this,'${esc1}','${esc2}',${parsed.options.indexOf(opt)})">${labels[i]}. ${opt}</button>`;
    }).join('') + '</div>';
  } else {
    renderWriteMode(card, parsed); return;
  }

  area.innerHTML = `
    <div class="quiz-card">
      <div class="question-number">Question ${state.currentIndex+1} of ${state.shuffled.length}</div>
      <span class="category-tag">${card.cat}</span>
      <div class="question-text">${parsed.stem}</div>
      ${optionsHtml}
      <div id="explanation"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="skipCard()">Skip</button>
    </div>`;
}

function renderFlashcard(card, parsed) {
  document.getElementById('gameArea').innerHTML = `
    <div class="quiz-card">
      <div class="question-number">Card ${state.currentIndex+1} of ${state.shuffled.length}</div>
      <span class="category-tag">${card.cat}</span>
      <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="flashcard">
          <div class="flashcard-face flashcard-front"><div>${parsed.stem}</div></div>
          <div class="flashcard-face flashcard-back"><div><strong>${card.a}</strong></div></div>
        </div>
      </div>
      <div class="flip-hint">Click to flip</div>
      <div class="confidence-meter" id="confidenceMeter" style="display:none;">
        <button class="confidence-btn hard"   onclick="rateCard('hard')">Hard – Again</button>
        <button class="confidence-btn medium" onclick="rateCard('medium')">Medium – Got It</button>
        <button class="confidence-btn easy"   onclick="rateCard('easy')">Easy – Know It</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="skipCard()">Skip</button>
    </div>`;
}

function renderWriteMode(card, parsed) {
  document.getElementById('gameArea').innerHTML = `
    <div class="quiz-card">
      <div class="question-number">Question ${state.currentIndex+1} of ${state.shuffled.length}</div>
      <span class="category-tag">${card.cat}</span>
      <div class="question-text">${parsed.stem}</div>
      <div class="text-input-area">
        <textarea class="text-input" id="writeAnswer" rows="3" placeholder="Type your answer…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();checkWritten();}"></textarea>
        <button class="btn btn-primary" onclick="checkWritten()">Check Answer</button>
      </div>
      <div id="explanation"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="skipCard()">Skip</button>
      <button class="btn btn-secondary" onclick="revealAnswer()">Reveal Answer</button>
    </div>`;
  setTimeout(() => document.getElementById('writeAnswer')?.focus(), 100);
}

// ===== ANSWER CHECKING =====
function checkMC(btn, selected, correct, originalIndex) {
  const card    = state.shuffled[state.currentIndex];
  const cardIdx = rawCards.indexOf(card);
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.classList.add('disabled'));

  const labels      = ['a','b','c','d'];
  const selectedFull= labels[originalIndex] + '. ' + selected;
  const isCorrect   = correct.includes(selected) || selectedFull === correct || selected === correct.replace(/^[a-d]\.\s*/,'');

  if (isCorrect) {
    btn.classList.add('correct');
    recordAnswer(cardIdx, true);
    showExplanation(true, correct);
  } else {
    btn.classList.add('incorrect');
    buttons.forEach(b => { if (b.textContent.includes(correct.replace(/^[a-d]\.\s*/,''))) b.classList.add('show-correct'); });
    recordAnswer(cardIdx, false);
    showExplanation(false, correct);
  }
  setTimeout(() => addNextButton(), 300);
}

function checkAnswer(btn, selected, correct) {
  const card    = state.shuffled[state.currentIndex];
  const cardIdx = rawCards.indexOf(card);
  const buttons = document.querySelectorAll('.tf-btn');
  buttons.forEach(b => b.classList.add('disabled'));

  if (selected === correct) {
    btn.classList.add('correct');
    recordAnswer(cardIdx, true);
    showExplanation(true, correct);
  } else {
    btn.classList.add('incorrect');
    buttons.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
    recordAnswer(cardIdx, false);
    showExplanation(false, correct);
  }
  setTimeout(() => addNextButton(), 300);
}

function checkWritten() {
  const input = document.getElementById('writeAnswer');
  if (!input) return;
  const card          = state.shuffled[state.currentIndex];
  const cardIdx       = rawCards.indexOf(card);
  const userAnswer    = input.value.trim().toLowerCase();
  const correctAnswer = card.a.toLowerCase();

  const correctWords  = correctAnswer.replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(w => w.length > 2);
  const userWords     = userAnswer.replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(w => w.length > 2);
  const matchCount    = correctWords.filter(w => userWords.some(uw => uw.includes(w) || w.includes(uw))).length;
  const matchRatio    = correctWords.length > 0 ? matchCount / correctWords.length : 0;
  const isCorrect     = matchRatio >= 0.5 || userAnswer === correctAnswer;

  input.disabled = true;
  input.style.borderColor = isCorrect ? 'var(--green)' : 'var(--red)';
  recordAnswer(cardIdx, isCorrect);
  showExplanation(isCorrect, card.a);
  addNextButton();
}

function revealAnswer() {
  const card = state.shuffled[state.currentIndex];
  document.getElementById('explanation').innerHTML =
    `<div class="explanation"><strong>Answer:</strong> ${card.a}</div>`;
  addNextButton();
}

function recordAnswer(cardIdx, correct) {
  state.answered++;
  if (correct) state.correct++;
  else { state.incorrect++; state.missed.push(state.shuffled[state.currentIndex]); }
  updateStreak(correct);
  if (!state.cardHistory[cardIdx]) state.cardHistory[cardIdx] = { right:0, wrong:0 };
  if (correct) state.cardHistory[cardIdx].right++;
  else         state.cardHistory[cardIdx].wrong++;
  saveState();
  updateStats();
}

function showExplanation(correct, answer) {
  const el = document.getElementById('explanation');
  if (!el) return;
  el.innerHTML = `<div class="explanation">${correct
    ? '<strong>Correct!</strong> ' + answer
    : '<strong>Incorrect.</strong> The correct answer is: ' + answer
  }</div>`;
}

function addNextButton() {
  if (document.querySelector('.next-btn-row')) return;
  const area = document.getElementById('gameArea');
  const div  = document.createElement('div');
  div.className = 'btn-row next-btn-row';
  div.innerHTML = `<button class="btn btn-primary" onclick="nextCard()">Next Question &rarr;</button>`;
  area.appendChild(div);
}

function nextCard() { state.currentIndex++; state.flipped = false; renderCard(); }
function skipCard() { state.currentIndex++; state.flipped = false; renderCard(); }

function flipCard() {
  const fc = document.getElementById('flashcard');
  if (!fc) return;
  state.flipped = !state.flipped;
  fc.classList.toggle('flipped');
  if (state.flipped) document.getElementById('confidenceMeter').style.display = 'flex';
}

function rateCard(rating) {
  const card    = state.shuffled[state.currentIndex];
  const cardIdx = rawCards.indexOf(card);
  if (!state.cardHistory[cardIdx]) state.cardHistory[cardIdx] = { right:0, wrong:0 };
  if (rating === 'hard')   { state.cardHistory[cardIdx].wrong++; state.incorrect++; state.shuffled.push(card); }
  else if (rating === 'easy') { state.cardHistory[cardIdx].right += 2; state.correct++; }
  else                        { state.cardHistory[cardIdx].right++;    state.correct++; }
  state.answered++;
  updateStreak(rating !== 'hard');
  saveState();
  nextCard();
}

// ===== EXAM MODE =====
function startExam() {
  state.examAnswers = [];
  state.shuffled    = [...rawCards].sort(() => Math.random() - 0.5).slice(0, 50);
  state.currentIndex= 0;
  state.examTimeLeft= 3600;
  if (state.examTimer) clearInterval(state.examTimer);
  state.examTimer = setInterval(() => {
    state.examTimeLeft--;
    const mins = Math.floor(state.examTimeLeft / 60);
    const secs = state.examTimeLeft % 60;
    const el   = document.getElementById('examTimer');
    if (el) el.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
    if (state.examTimeLeft <= 0) { clearInterval(state.examTimer); finishExam(); }
  }, 1000);
  renderCard();
}

function finishExam() { if (state.examTimer) clearInterval(state.examTimer); showResults(); }

// ===== RESULTS =====
function showResults() {
  const area  = document.getElementById('gameArea');
  const pct   = state.answered > 0 ? Math.round((state.correct / state.answered) * 100) : 0;
  const cls   = pct >= 80 ? 'great' : pct >= 60 ? 'okay' : 'needs-work';

  let missedHtml = '';
  if (state.missed.length > 0) {
    missedHtml = `<h3 style="text-align:left;margin:20px 0 12px;">Review These (${state.missed.length}):</h3>
    <div class="missed-list">${state.missed.slice(-20).map(c => `
      <div class="missed-item">
        <div class="missed-q">${parseQuestion(c).stem.substring(0,120)}…</div>
        <div class="missed-a">${c.a}</div>
      </div>`).join('')}</div>`;
  }

  area.innerHTML = `
    <div class="quiz-card results">
      <h2>Session Complete!</h2>
      <div class="score ${cls}">${pct}%</div>
      <p style="color:var(--muted);">${state.correct} correct out of ${state.answered} answered</p>
      <p style="color:var(--muted);margin-top:8px;">Best streak: ${state.maxStreak}</p>
      ${missedHtml}
      <div class="btn-row" style="justify-content:center;margin-top:25px;">
        <button class="btn btn-primary"   onclick="resetSession()">New Session</button>
        <button class="btn btn-secondary" onclick="setMode('hardest')">Practice Missed</button>
        <button class="btn btn-danger"    onclick="resetAll()">Reset All Stats</button>
      </div>
    </div>`;
}

function resetSession() {
  state.currentIndex = 0; state.missed = []; state.streak = 0; state.maxStreak = 0;
  document.getElementById('streak').classList.remove('active');
  shuffle(); renderCard();
}

function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  state = { mode: state.mode, currentIndex:0, answered:0, correct:0, incorrect:0,
            streak:0, maxStreak:0, missed:[], hardCards:[], cardHistory:{},
            filteredCards:[...rawCards], shuffled:[], flipped:false,
            examTimer:null, examTimeLeft:0, examAnswers:[] };
  localStorage.removeItem('inQuizState');
  shuffle(); renderCard();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.key === 'ArrowRight' || e.key === 'n') && !e.target.matches('textarea, input')) {
    const btn = document.querySelector('.next-btn-row .btn');
    if (btn) btn.click();
  }
  if (e.key === ' ' && state.mode === 'flashcard') { e.preventDefault(); flipCard(); }
  if (state.mode === 'flashcard' && state.flipped) {
    if (e.key === '1') rateCard('hard');
    if (e.key === '2') rateCard('medium');
    if (e.key === '3') rateCard('easy');
  }
});

init();
</script>
</body>
</html>
